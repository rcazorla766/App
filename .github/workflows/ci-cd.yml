name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ai-house-predictor
  CONFIG_REPO: Config

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-test.txt

      - name: Validate imports
        run: python -c "from app.main import app"

      - name: Run pytest
        run: python -m pytest

  build-publish-gitops:
    name: Build, Publish & Update GitOps
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${GITHUB_REPOSITORY_OWNER}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.image }}:run-${{ github.run_number }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.8.1"

      - name: Update GitOps manifest in Config repository
        env:
          CONFIG_REPO_TOKEN: ${{ secrets.CONFIG_REPO_TOKEN }}
          IMAGE: ${{ steps.meta.outputs.image }}
          IMAGE_TAG: ${{ steps.meta.outputs.short_sha }}
        run: |
          set -euo pipefail

          if [ -z "${CONFIG_REPO_TOKEN}" ]; then
            echo "ERROR: CONFIG_REPO_TOKEN secret is not configured."
            exit 1
          fi

          git clone "https://x-access-token:${CONFIG_REPO_TOKEN}@github.com/${GITHUB_REPOSITORY_OWNER}/${CONFIG_REPO}.git" config-repo
          cd config-repo/overlays/prod

          kustomize edit set image "ai-house-predictor=${IMAGE}:${IMAGE_TAG}"

          if git diff --quiet; then
            echo "No manifest changes detected. Skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kustomization.yaml
          git commit -m "ci(app): update prod image to ${IMAGE}:${IMAGE_TAG}"
          git push origin main
