name: CI Pipeline

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-test.txt

      - name: Validate imports
        run: |
          python -c "from app.main import app"

      - name: Run tests
        run: |
          pytest
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/ai-house-predictor:latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/ai-house-predictor:latest
