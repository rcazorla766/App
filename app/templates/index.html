<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>AI House Price Prediction</title>

    <link rel="stylesheet" href="/static/style.css">

    <script src="/static/app.js"></script>
</head>

<body>

    <div class="container">

        <div class="header">

            <h1>AI House Price Prediction</h1>

            <div class="model-info">

                <p><strong>Model:</strong> House Price Predictor</p>

                <p><strong>Version:</strong> v1</p>

            </div>

        </div>

        <form id="prediction-form">

            <label>Median Income</label>
            <input type="number" step="any" id="MedInc">

            <label>House Age</label>
            <input type="number" step="any" id="HouseAge">

            <label>Average Rooms</label>
            <input type="number" step="any" id="AveRooms">

            <label>Average Bedrooms</label>
            <input type="number" step="any" id="AveBedrms">

            <label>Population</label>
            <input type="number" step="any" id="Population">

            <label>Average Occupancy</label>
            <input type="number" step="any" id="AveOccup">

            <label>Latitude</label>
            <input type="number" step="any" id="Latitude">

            <label>Longitude</label>
            <input type="number" step="any" id="Longitude">

            <button id="predict-button" type="button">

                Predict

            </button>

        </form>

        <div class="prediction">

            <h2>Prediction</h2>

            <p id="prediction-result">-</p>

        </div>

    </div>

</body>

</html>
